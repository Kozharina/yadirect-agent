# yadirect-agent policy — example.
#
# Copy this file to `agent_policy.yml` at the repo root and tune the
# numbers to your account before running the agent. The agent refuses
# to start without an account-level cap configured.
#
# Fields marked EXTENDED are land-later (M2.1+); this PR only reads
# the budget-cap slice. Including the extra keys here keeps the file
# format stable across milestones.
#
# `agent_policy.yml` is gitignored. `agent_policy.example.yml` is not.
# Never commit production caps; keep them in a local `.yml` only.

# --- Hard ceilings (kill-switch #1, this PR) -------------------------------

# Account-wide hard cap on summed active daily budgets, in RUB. Any plan
# that would push the sum over this value is refused by the agent before
# it reaches the Direct API.
account_daily_budget_cap_rub: 10000

# Optional per-group caps. Keys are free-form group labels stored on each
# campaign (`CampaignBudget.group`). Groups not listed here are bounded
# only by the account cap.
campaign_group_caps_rub:
  brand: 3000
  non-brand: 5000
  retargeting: 2000

